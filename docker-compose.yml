services:
  backend:
    build:
      dockerfile: backend/Dockerfile.dev
    container_name: docker-backend
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/backend/node_modules

  frontend:
    build:
      dockerfile: frontend/Dockerfile.dev
    container_name: docker-frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/frontend/node_modules
    depends_on:
      - backend
